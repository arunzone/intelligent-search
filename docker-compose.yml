# Production — deps baked into image at build time, no volume mounts.
# Usage: docker compose up --build

services:

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  ollama-setup:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "llama3.2"]

  app:
    build:
      context: .
      dockerfile: Dockerfile        # deps installed at build time
    ports:
      - "8001:8001"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - COMPANY_SEARCH_URL=http://host.docker.internal:8000
      - COMPANY_SEARCH_TIMEOUT=10.0
      - HOST=0.0.0.0
      - PORT=8001
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      ollama-setup:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  ollama_data:
