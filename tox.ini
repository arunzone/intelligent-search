[tox]
minversion = 3.24
envlist = default
isolated_build = True

[testenv]
description = Run linting, type checking, and tests
setenv =
    TOXINIDIR = {toxinidir}
    PYTHONDONTWRITEBYTECODE = 1
    PYTHONPATH = {toxinidir}/src
    PYTHONTRACEMALLOC = 1
    GLOB_EXCLUDE = *.egg-info,*venv*,.git,.mypy_cache,.pytest_cache,__pycache__,build,dist,.tox
passenv =
    HOME
    SETUPTOOLS_*
    OLLAMA_BASE_URL
    OLLAMA_MODEL
    COMPANY_SEARCH_URL
extras =
    testing
commands =
    autoflake --check --remove-unused-variables --remove-all-unused-imports --recursive src tests
    ruff check .
    ruff format --check .
    mypy src
    bandit -r src
    radon cc . -a -s -nb --exclude="{env:GLOB_EXCLUDE}"
    xenon --exclude="{env:GLOB_EXCLUDE}" --max-absolute A --max-modules A --max-average A .
    pytest --junitxml=build/pytest.xml -vv --tb=native --random-order \
           --cov intelligent_search --cov-fail-under=80 \
           --cov-report term-missing --cov-report xml {posargs}

[testenv:format]
description = Auto-format code with ruff
changedir = {toxinidir}
extras =
    testing
commands =
    autoflake --in-place --remove-unused-variables --remove-all-unused-imports --recursive src tests
    ruff format .
    ruff check --fix .

[testenv:watch]
description = Watch for file changes and re-run affected tests automatically
changedir = {toxinidir}
usedevelop = True
setenv =
    TESTMON_DATAFILE = {envdir}/.testmon
    PYTHONTRACEMALLOC = 1
passenv =
    HOME
    OLLAMA_BASE_URL
    OLLAMA_MODEL
    COMPANY_SEARCH_URL
extras =
    testing
commands =
    ptw --poll --runner "pytest --testmon --random-order" {posargs}

[testenv:test]
description = Run tests only (no lint/type checks)
extras =
    testing
commands =
    pytest {posargs}

[testenv:{build,clean}]
description =
    build: Build the package
    clean: Remove build artifacts
skip_install = True
changedir = {toxinidir}
deps =
    build: build[virtualenv]
commands =
    clean: python -c 'import shutil; [shutil.rmtree(p, True) for p in ("build", "dist")]'
    clean: python -c 'import pathlib, shutil; [shutil.rmtree(p, True) for p in pathlib.Path("src").glob("*.egg-info")]'
    build: python -m build {posargs}
